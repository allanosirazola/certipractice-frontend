<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="DATABRICKS-DE Data Engineer certification badge">
  <defs>
    <linearGradient id="g-DATABRICKS-DE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3621"/>
      <stop offset="100%" stop-color="#1B3139"/>
    </linearGradient>
    <radialGradient id="r-DATABRICKS-DE" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-DATABRICKS-DE" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- outer ring -->
  <circle cx="100" cy="100" r="94" fill="url(#g-DATABRICKS-DE)" filter="url(#shadow-DATABRICKS-DE)"/>
  <circle cx="100" cy="100" r="94" fill="url(#r-DATABRICKS-DE)"/>

  <!-- inner disk -->
  <circle cx="100" cy="100" r="80" fill="#1B3139" opacity="0.92"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>

  <!-- speciality glyph (centered, scaled to 100x100 box at 50,40) -->
  <g transform="translate(50,40)">
    <path d="M30 30 h40 v8 h-40 z M30 46 h40 v8 h-40 z M30 62 h40 v8 h-40 z" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- cert code label band -->
  <rect x="20" y="138" width="160" height="34" rx="6" fill="#FF3621" opacity="0.96"/>
  <text x="100" y="161" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="1">DATABRICKS</text>

  <!-- provider mark -->
  <text x="100" y="118" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="600"
    fill="#FFFFFF"
    opacity="0.75"
    letter-spacing="2">DATABRICKS</text>
</svg>