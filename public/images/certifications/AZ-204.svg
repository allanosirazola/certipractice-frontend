<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="AZ-204 Azure Developer certification badge">
  <defs>
    <linearGradient id="g-AZ-204" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#50E6FF"/>
    </linearGradient>
    <radialGradient id="r-AZ-204" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-AZ-204" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- outer ring -->
  <circle cx="100" cy="100" r="94" fill="url(#g-AZ-204)" filter="url(#shadow-AZ-204)"/>
  <circle cx="100" cy="100" r="94" fill="url(#r-AZ-204)"/>

  <!-- inner disk -->
  <circle cx="100" cy="100" r="80" fill="#50E6FF" opacity="0.92"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>

  <!-- speciality glyph (centered, scaled to 100x100 box at 50,40) -->
  <g transform="translate(50,40)">
    <path d="M30 35 L18 50 L30 65 M70 35 L82 50 L70 65 M58 28 L42 72" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- cert code label band -->
  <rect x="20" y="138" width="160" height="34" rx="6" fill="#0078D4" opacity="0.96"/>
  <text x="100" y="161" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="19"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="1">AZ-204</text>

  <!-- provider mark -->
  <text x="100" y="118" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="600"
    fill="#FFFFFF"
    opacity="0.75"
    letter-spacing="2">AZURE</text>
</svg>