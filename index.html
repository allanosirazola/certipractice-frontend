<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>CertiPractice – Free Cloud Certification Practice Exams</title>
    <meta name="title" content="CertiPractice – Free Cloud Certification Practice Exams" />
    <meta name="description" content="Practice for AWS, Google Cloud, Azure, Databricks and Snowflake certifications with thousands of real exam questions. Instant explanations, progress tracking, and exam simulations. 100% free." />
    <meta name="keywords" content="cloud certification practice exam, AWS certification practice, Google Cloud exam questions, Azure certification test, Databricks certification, Snowflake exam prep, free certification practice, SAA-C03 practice, AZ-900 questions" />
    <meta name="author" content="CertiPractice" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#2563EB" />

    <!-- Canonical -->
    <link rel="canonical" href="https://certipractice.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://certipractice.app/" />
    <meta property="og:site_name" content="CertiPractice" />
    <meta property="og:title" content="CertiPractice – Free Cloud Certification Practice Exams" />
    <meta property="og:description" content="Practice for AWS, Google Cloud, Azure, Databricks and Snowflake certifications with thousands of real exam questions. Instant explanations and exam simulations." />
    <meta property="og:image" content="https://certipractice.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CertiPractice – Cloud Certification Practice Platform" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@certipractice" />
    <meta name="twitter:title" content="CertiPractice – Free Cloud Certification Practice Exams" />
    <meta name="twitter:description" content="Practice for AWS, Google Cloud, Azure, Databricks and Snowflake with thousands of real exam questions. Free, instant explanations." />
    <meta name="twitter:image" content="https://certipractice.app/og-image.png" />
    <meta name="twitter:image:alt" content="CertiPractice – Cloud Certification Practice Platform" />

    <!-- hreflang -->
    <link rel="alternate" hreflang="en" href="https://certipractice.app/" />
    <link rel="alternate" hreflang="es" href="https://certipractice.app/?lang=es" />
    <link rel="alternate" hreflang="x-default" href="https://certipractice.app/" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://certipractice.app" />

    <!-- Base Structured Data: Organization + WebSite -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CertiPractice",
        "url": "https://certipractice.app",
        "logo": "https://certipractice.app/favicon.png",
        "description": "Free cloud certification practice exam platform for AWS, Google Cloud, Azure, Databricks and Snowflake.",
        "sameAs": []
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CertiPractice",
        "url": "https://certipractice.app",
        "description": "Practice for cloud certifications with thousands of real exam questions, instant explanations and progress tracking.",
        "inLanguage": ["en", "es"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://certipractice.app/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is CertiPractice free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, CertiPractice is completely free. You can take full practice exams without creating an account. Register to save your progress and access advanced features."
            }
          },
          {
            "@type": "Question",
            "name": "Which certifications does CertiPractice support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "CertiPractice supports AWS (SAA-C03, DVA-C02, SOA-C02 and more), Google Cloud (Professional Cloud Architect, Data Engineer, ML Engineer), Microsoft Azure (AZ-900, AZ-104, AZ-204), Databricks (Data Engineer, ML Professional) and Snowflake certifications."
            }
          },
          {
            "@type": "Question",
            "name": "How are the practice questions created?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Questions are curated from real exam experiences, official documentation and community contributions. Each question includes a detailed explanation of the correct answer."
            }
          },
          {
            "@type": "Question",
            "name": "Can I track my progress over time?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Create a free account to track your exam history, see your scores, identify weak areas through the Failed Questions mode, and monitor your improvement over time."
            }
          }
        ]
      }
    ]
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
