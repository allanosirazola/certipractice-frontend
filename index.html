  <head>

    <!-- Base Structured Data: Organization + WebSite -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CertiPractice",
        "url": "https://certipractice.vercel.app",
        "logo": "https://certipractice.vercel.app/favicon.png",
        "description": "Free cloud certification practice exam platform for AWS, Google Cloud, Azure, Databricks and Snowflake.",
        "sameAs": []
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CertiPractice",
        "url": "https://certipractice.vercel.app",
        "description": "Practice for cloud certifications with thousands of real exam questions, instant explanations and progress tracking.",
        "inLanguage": ["en", "es"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://certipractice.vercel.app/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is CertiPractice free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, CertiPractice is completely free. You can take full practice exams without creating an account. Register to save your progress and access advanced features."
            }
          },
          {
            "@type": "Question",
            "name": "Which certifications does CertiPractice support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "CertiPractice supports AWS (SAA-C03, DVA-C02, SOA-C02 and more), Google Cloud (Professional Cloud Architect, Data Engineer, ML Engineer), Microsoft Azure (AZ-900, AZ-104, AZ-204), Databricks (Data Engineer, ML Professional) and Snowflake certifications."
            }
          },
          {
            "@type": "Question",
            "name": "How are the practice questions created?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Questions are curated from real exam experiences, official documentation and community contributions. Each question includes a detailed explanation of the correct answer."
            }
          },
          {
            "@type": "Question",
            "name": "Can I track my progress over time?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Create a free account to track your exam history, see your scores, identify weak areas through the Failed Questions mode, and monitor your improvement over time."
            }
          }
        ]
      }
    ]
    </script>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1098845223790619" crossorigin="anonymous"></script>

  </head>
  <body>
    <noscript>
      <div style="font-family: system-ui, -apple-system, Segoe UI, sans-serif; padding: 2rem; max-width: 640px; margin: 4rem auto; text-align: center; line-height: 1.6;">
        <h1 style="color: #1e40af;">CertiPractice</h1>
        <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings and reload the page.</p>
        <p style="color: #6b7280; font-size: 0.9rem;">Esta aplicación requiere JavaScript para funcionar. Por favor, habilita JavaScript en tu navegador y recarga la página.</p>
      </div>
    </noscript>
    <div id="root">
      <!-- Initial loading state, shown until JS hydrates -->
      <div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #eff6ff; font-family: system-ui, -apple-system, sans-serif;" aria-label="Loading CertiPractice">
        <div style="text-align: center;">
          <div style="width: 48px; height: 48px; border: 4px solid #dbeafe; border-top-color: #2563eb; border-radius: 50%; margin: 0 auto 16px; animation: cp-spin 1s linear infinite;"></div>
          <p style="color: #6b7280; font-size: 14px; margin: 0;">CertiPractice</p>
        </div>
      </div>
      <style>@keyframes cp-spin { to { transform: rotate(360deg); } }</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
